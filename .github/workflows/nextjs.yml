name: Next.js CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: stellar-frontend-challenge/package-lock.json

      - name: Install dependencies
        run: |
          cd stellar-frontend-challenge
          npm install

      - name: Lint
        run: |
          cd stellar-frontend-challenge
          npm run lint

      - name: Build
        run: |
          cd stellar-frontend-challenge
          npm run build
